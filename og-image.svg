<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f1623"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Blue accent shape bottom-right -->
  <rect x="980" y="330" width="220" height="300" fill="#2b5ea7" opacity="0.15"/>
  <rect x="1060" y="250" width="140" height="380" fill="#2b5ea7" opacity="0.10"/>

  <!-- Orange accent bar -->
  <rect x="80" y="200" width="60" height="6" fill="#e85d26"/>

  <!-- Main headline - big and centered -->
  <text x="80" y="310" font-family="'Plus Jakarta Sans', system-ui, -apple-system, sans-serif" font-size="105" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="-3">Fractional COO</text>
  <text x="80" y="430" font-family="'Plus Jakarta Sans', system-ui, -apple-system, sans-serif" font-size="105" font-weight="800" fill="#e85d26" text-anchor="start" letter-spacing="-3">&amp; AI Automation</text>
</svg>
