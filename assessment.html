<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exit Readiness Assessment — Startup to Sold</title>
  <meta name="description" content="Find out if your business is sellable — or just a job. The free 12-question Exit Readiness Assessment by Chuck Temple." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="book-cover.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0e0e0e;
      --cream: #f5f0e8;
      --warm-white: #faf8f4;
      --gold: #b8924a;
      --gold-light: #d4aa6a;
      --muted: #6b6560;
      --rule: #d4cfc8;
      --section-bg: #1a1714;
      --dark-text: #e8e2d8;
      --dark-muted: #8a8078;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm-white);
      color: var(--ink);
      font-size: 20px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.25rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(250, 248, 244, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--rule);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-cta {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-cta:hover { color: var(--ink); border-color: var(--ink); }

    /* BUTTONS */
    .btn-primary {
      display: inline-block;
      background: var(--ink);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 1.1rem 2.25rem;
      transition: background 0.2s, transform 0.15s;
      min-height: 52px;
      display: inline-flex;
      align-items: center;
    }

    .btn-primary:hover { background: var(--gold); transform: translateY(-1px); }

    .btn-secondary {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #4a4540;
      text-decoration: none;
      border-bottom: 2px solid #4a4540;
      padding-bottom: 3px;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover { color: var(--ink); border-color: var(--ink); }

    /* HEADINGS */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 5vw, 4rem);
      font-weight: 300;
      line-height: 1.12;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
    }

    .hero-sub {
      font-size: 1.15rem;
      font-weight: 400;
      color: #4a4540;
      line-height: 1.75;
      margin-bottom: 2.5rem;
      max-width: 440px;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 1.5rem;
      height: 1px;
      background: var(--gold);
    }

    /* ASSESSMENT-SPECIFIC SECTIONS */
    .assessment-hero { background: var(--warm-white); }
    .section-light { padding: 7rem 3rem; background: var(--warm-white); }
    .section-cream { background: var(--cream); padding: 7rem 3rem; }
    .section-dark { background: var(--section-bg); color: var(--dark-text); padding: 7rem 3rem; }
    .section-inner { max-width: 1200px; margin: 0 auto; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Startup to Sold</a>
    <div style="display:flex;gap:2rem;align-items:center;">
      <a href="https://calendly.com/chuck-startuptosold" target="_blank" rel="noopener" class="nav-cta">Book a Call</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="assessment-hero">
    <div style="padding-top:9rem;padding-bottom:5rem;padding-left:3rem;padding-right:3rem;max-width:1200px;margin:0 auto;">
      <div class="section-label">The Assessment</div>
      <h1>Is your business <em>sellable</em> — or just a job?</h1>
      <p class="hero-sub">Answer 12 questions about your operations. See your Dependency Score and what it means for your exit valuation.</p>
    </div>
  </section>

</body>
</html>
